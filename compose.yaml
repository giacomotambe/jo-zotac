services:
  jo-zotac:
    build:
      network: host
      context: .
      dockerfile: docker/Dockerfile
    privileged: true
    image: jo-zotac
    stdin_open: true
    tty: true
    network_mode: host
    ipc: host
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ~/.Xauthority:/tmp/.Xauthority:ro
      - /dev:/dev
      - ./jo_bringup:/home/ros/src/jo_bringup
      - ./glim:/home/ros/src/glim
      - ./glim_ros2:/home/ros/src/glim_ros2
      - ./duccio_2026_03_04_15_40:/home/ros/duccio_2026_03_04_15_40
      - ./rosbag2_2026_03_24-12_24_08:/home/ros/rosbag2_2026_03_24-12_24_08
    environment:
      - DISPLAY
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all,graphics,display,video,utility,compute
      - __NV_PRIME_RENDER_OFFLOAD=0 
      - __GLX_VENDOR_LIBRARY_NAME=
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - XAUTHORITY=/tmp/.Xauthority
    group_add:
      - dialout

    command: bash